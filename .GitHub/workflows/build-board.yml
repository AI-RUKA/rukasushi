name: Build board HTML

on:
  push:
    paths:
      - "board/posts.json"
      - "board/template.html"
      - "board/build.js"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node board/build.js
      - name: Commit built index.html
        run: |
          git config user.name "board-bot"
          git config user.email "board-bot@users.noreply.github.com"
          git add board/index.html
          git diff --cached --quiet || git commit -m "build board/index.html"
          git push
